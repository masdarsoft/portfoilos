# Nginx configuration for malakparties.com
#
# Location on VPS: /etc/nginx/sites-available/portfoilos
# Symlink:         ln -s /etc/nginx/sites-available/portfoilos /etc/nginx/sites-enabled/
#
# After first deploy, run Certbot to replace the HTTP block with HTTPS:
#   sudo certbot --nginx -d malakparties.com -d www.malakparties.com

# Redirect bare HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name malakparties.com www.malakparties.com;

    # Certbot will add its ACME challenge location here automatically.
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name malakparties.com www.malakparties.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/malakparties.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/malakparties.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin"   always;

    # Tell Django it is behind HTTPS proxy (matches SECURE_PROXY_SSL_HEADER)
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Host              $host;

    # Django API - Gunicorn on port 8000
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Media files
    location /media/ {
        alias /home/portfoilos/portfoilos/portfoilo_tenant_server/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Django Static files
    location /static/ {
        alias /home/portfoilos/portfoilos/portfoilo_tenant_server/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Next.js Frontend - PM2 on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss image/svg+xml;

    client_max_body_size 200M; # Allowed up to 200M for drone video uploads
}
